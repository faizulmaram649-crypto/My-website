* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #fff; height: 100vh; overflow: hidden; }
.app { display: flex; height: 100%; }
.sidebar { width: 200px; background: #121218; padding: 12px; border-right: 1px solid #28282f; overflow-y: auto; flex-shrink: 0; }
.logo { font-size: 20px; font-weight: 700; color: #00d48a; margin-bottom: 12px; }
.btn { width: 100%; padding: 9px 10px; background: transparent; border: 1px solid #28282f; border-radius: 6px; color: #9ca3af; margin-bottom: 4px; cursor: pointer; font-size: 11px; text-align: left; display: flex; align-items: center; gap: 8px; }

.head { font-size: 10px; text-transform: uppercase; color: #6b7280; margin: 10px 0 5px; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.header { padding: 12px 16px; border-bottom: 1px solid #28282f; display: flex; justify-content: space-between; align-items: center; }

.clear-btn { padding: 6px 12px; background: transparent; border: 1px solid #28282f; border-radius: 6px; color: #9ca3af; cursor: pointer; font-size: 11px; }
.chat { flex: 1; overflow-y: auto; padding: 15px; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
.icon { width: 70px; height: 70px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.welcome h2 { font-size: 24px; margin: 10px 0 4px; }
.welcome h3 { color: #00d48a; margin-bottom: 8px; }
.welcome p { font-size: 12px; color: #888; margin-bottom: 12px; }
.quick { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 220px; }
.quick button { padding: 7px 10px; background: #1a1a22; border: 1px solid #28282f; border-radius: 6px; color: #fff; cursor: pointer; font-size: 10px; }
.quick button:hover { background: #00d48a; color: #000; }
#msg { display: flex; flex-direction: column; gap: 10px; }
.m { display: flex; gap: 8px; }
.m.user { flex-direction: row-reverse; }
.av { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.m.user .av { background: #00d48a; color: #000; }
.m.bot .av { background: linear-gradient(135deg, #8b5cf6, #00d48a); color: #fff; }
.ct { max-width: 72%; padding: 9px 11px; border-radius: 10px; font-size: 11px; line-height: 1.4; }
.m.user .ct { background: #00d48a; color: #000; border-bottom-right-radius: 2px; }
.m.bot .ct { background: #1a1a22; border: 1px solid #28282f; white-space: pre-line; }
.input-area { padding: 12px 16px; background: #0a0a0f; }
.input-box { max-width: 100%; margin: 0 auto; background: #1e1e28; border: 1px solid #28282f; border-radius: 10px; display: flex; padding: 5px; }
.input-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 12px; padding: 8px; outline: none; font-family: 'Poppins'; }
.input-box input::placeholder { color: #6b7280; }
.input-box button { width: 34px; height: 34px; background: #00d48a; border: none; border-radius: 6px; color: #000; cursor: pointer; font-size: 13px; font-weight: 600; }
.info { max-width: 100%; margin: 5px auto 0; font-size: 9px; color: #6b7280; }
@media (max-width: 768px) { .sidebar { display: none; } }
