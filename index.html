<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500:600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #fff; height: 100vh; overflow: hidden; }
.app { display: flex; height: 100%; }
.sidebar { width: 210px; background: #121218; padding: 12px; border-right: 1px solid #28282f; overflow-y: auto; flex-shrink: 0; }
.logo { font-size: 20px; font-weight: 700; color: #00d48a; margin-bottom: 12px; }
.btn { width: 100%; padding: 8px 10px; background: transparent; border: 1px solid #28282f; border-radius: 6px; color: #9ca3af; margin-bottom: 4px; cursor: pointer; font-size: 12px; text-align: left; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
.btn:hover { background: #252530; color: #00d48a; border-color: #00d48a; }
.head { font-size: 10px; text-transform: uppercase; color: #6b7280; margin: 10px 0 6px; letter-spacing: 1px; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.header { padding: 12px 16px; border-bottom: 1px solid #28282f; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; background: linear-gradient(90deg, #00d48a, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.clear-btn { padding: 6px 12px; background: transparent; border: 1px solid #28282f; border-radius: 6px; color: #9ca3af; cursor: pointer; font-size: 11px; }
.chat { flex: 1; overflow-y: auto; padding: 15px; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
.icon { width: 70px; height: 70px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.welcome h2 { font-size: 24px; margin: 10px 0 4px; }
.welcome h3 { color: #00d48a; margin-bottom: 8px; }
.quick { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 240px; }
.quick button { padding: 7px 10px; background: #1a1a22; border: 1px solid #28282f; border-radius: 6px; color: #fff; cursor: pointer; font-size: 11px; }
.quick button:hover { background: #00d48a; color: #000; }
#msg { display: flex; flex-direction: column; gap: 10px; }
.m { display: flex; gap: 8px; }
.m.user { flex-direction: row-reverse; }
.av { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.m.user .av { background: #00d48a; color: #000; }
.m.bot .av { background: linear-gradient(135deg, #8b5cf6, #00d48a); color: #fff; }
.ct { max-width: 72%; padding: 10px 12px; border-radius: 12px; font-size: 12px; line-height: 1.4; }
.m.user .ct { background: #00d48a; color: #000; border-bottom-right-radius: 3px; }
.m.bot .ct { background: #1a1a22; border: 1px solid #28282f; white-space: pre-line; }
.input-area { padding: 12px 16px; background: #0a0a0f; }
.input-box { max-width: 100%; margin: 0 auto; background: #1e1e28; border: 1px solid #28282f; border-radius: 12px; display: flex; padding: 6px; }
.input-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 13px; padding: 8px; outline: none; font-family: 'Poppins', sans-serif; }
.input-box input::placeholder { color: #6b7280; }
.input-box button { width: 36px; height: 36px; background: #00d48a; border: none; border-radius: 6px; color: #000; cursor: pointer; font-size: 14px; font-weight: 600; }
.info { max-width: 100%; margin: 6px auto 0; font-size: 10px; color: #6b7280; }
@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo"><i class="fa-solid fa-robot"></i> Faizul AI</div>
<button class="btn" data-ask="who is faizul"><i class="fa-solid fa-user"></i> About Creator</button>
<button class="btn" data-ask="india"><i class="fa-solid fa-flag"></i> India</button>
<button class="btn" data-ask="bihar"><i class="fa-solid fa-map"></i> Bihar</button>
<button class="btn" data-ask="countries"><i class="fa-solid fa-globe"></i> Countries</button>
<button class="btn" data-ask="urdu"><i class="fa-solid fa-language"></i> Urdu</button>
<button class="btn" data-ask="hindi"><i class="fa-solid fa-language"></i> Hindi</button>
<button class="btn" data-ask="english"><i class="fa-solid fa-language"></i> English</button>
<div class="head">Cricket</div>
<button class="btn" data-ask="virat">Virat</button>
<button class="btn" data-ask="dhoni">Dhoni</button>
<button class="btn" data-ask="rohit">Rohit</button>
<div class="head">Education</div>
<button class="btn" data-ask="math">Math</button>
<button class="btn" data-ask="science">Science</button>
<div class="head">Mobile</div>
<button class="btn" data-ask="mobile">Mobile</button>
<button class="btn" data-ask="whatsapp">WhatsApp</button>
<button class="btn" data-ask="instagram">Instagram</button>
<div class="head">Islamic</div>
<button class="btn" data-ask="islam">Islam</button>
<button class="btn" data-ask="quran">Quran</button>
<button class="btn" data-ask="dua">Dua</button>
<div class="head">Lifestyle</div>
<button class="btn" data-ask="food">Food</button>
<button class="btn" data-ask="health">Health</button>
<div class="head">Fun</div>
<button class="btn" data-ask="jokes">Jokes</button>
<button class="btn" data-ask="facts">Facts</button>
</aside>
<main class="main">
<header class="header">
<h1>Faizul AI</h1>
<button class="clear-btn" id="clearBtn"><i class="fa-solid fa-trash"></i> Clear</button>
</header>
<div class="chat" id="chatArea">
<div class="welcome" id="welcome">
<div class="icon"><i class="fa-solid fa-robot"></i></div>
<h2>Hello!</h2>
<h3>Welcome to Faizul AI</h3>
<p>Your Knowledge Assistant</p>
<div class="quick">
<button data-ask="hello">Hello</button>
<button data-ask="who is faizul">Creator</button>
<button data-ask="bihar">Bihar</button>
<button data-ask="urdu">Urdu</button>
<button data-ask="hindi">Hindi</button>
<button data-ask="jokes">Jokes</button>
</div>
</div>
<div id="msg"></div>
</div>
<div class="input-area">
<div class="input-box">
<input type="text" id="txt" placeholder="Ask anything..." autocomplete="off">
<button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
</div>
<div class="info">Press Enter to send</div>
</div>
</main>
</div>

<script>
// Complete Database
var db = {
"hello": "Hello! Welcome to Faizul AI!\n\nI can answer in English, Hindi, Urdu!\n\nAsk about:\n- Who is Faizul (Creator)\n- India, Bihar, Countries\n- Cricket Players\n- Education, Science\n- Mobile, WhatsApp\n- English, Hindi, Urdu\n- Islam, Quran\n- Food, Health\n- Jokes & Facts\n\nWhat would you like to know?",
"hi": "Hi! Welcome to Faizul AI!",
"who is faizul": "FAIZUL MARAM - CREATOR\n\nYouTube: @faizulmaram17\n\nContent: Islamic status videos, Religious quotes, Duas, Motivational clips\n\nDeveloper: Website, AI Chatbot, App Developer",
"faizul": "FAIZUL MARAM\n\nYouTube: @faizulmaram17\nContent: Islamic videos",
"india": "INDIA - 28 STATES + 8 UT\n\nNorth: Delhi, Haryana, Punjab, HP, Uttarakhand, J&K\nWest: Rajasthan, Gujarat, Goa, Maharashtra\nEast: WB, Odisha, Bihar, Jharkhand\nSouth: Karnataka, TN, Kerala\nCentral: MP, UP\nNE: Assam, Sikkim\n\nCapital: New Delhi\nPop: 140 Crore+",
"bihar": "BIHAR\n\nCapital: Patna\nCM: Nitish Kumar\nPop: 12.4 Crore\n\nCities: Patna, Gaya, Bhagalpur, Muzaffarpur\n\nFamous: Litti Chokha, Litchi\nLord Buddha born in Gaya!",
"countries": "COUNTRIES\n\nAsia: India-Delhi, China-Beijing, Japan-Tokyo, Pakistan-Islamabad, Bangladesh-Dhaka\nEurope: UK-London, France-Paris, Germany-Berlin\nAmericas: USA-Washington, Canada-Ottawa\nAfrica: Egypt-Cairo\nAustralia: Canberra",
"virat": "VIRAT KOHLI\n\nJersey: 18\nBorn: 5 Nov 1988\nKing Kohli!\nRuns: 25000+\nWorld Cup 2011!",
"dhoni": "MS DHONI\n\nJersey: 7\nBorn: 7 July 1981\nCaptain Cool!\nWorld Cup 2011 (Captain)!",
"rohit": "ROHIT SHARMA\n\nJersey: 45\nBorn: 30 April 1987\nHighest: 264 (Record!)",
"math": "MATH\n(a+b)2 = a2+2ab+b2\na2-b2 = (a+b)(a-b)\nCircle = pr2\na2+b2 = c2",
"science": "SCIENCE\n\nLight: 3x108 m/s\nGravity: 9.8 m/s2\nWater: H2O\nHuman: 60% water",
"history": "HISTORY\n\nAncient: Indus Valley, Maurya, Gupta\nMedieval: Delhi Sultanate, Mughal\nBritish: 1757-1947\nIndependence: 1947",
"english": "ENGLISH\n\nWorld's most spoken language\n1.5 billion speakers\nUsed in business globally",
"hindi": "HINDI\n\nIndia's most spoken language\n600 million speakers\nBollywood language\nDevanagari script",
"urdu": "URDU\n\nPoetical language\nNastaliq script\nUsed in India, Pakistan\nFamous ghazals",
"mobile": "MOBILE\n\nBrands: Apple, Samsung, OnePlus, Realme, Redmi\nOS: iOS, Android",
"whatsapp": "WHATSAPP\n\nPopular messaging app\n2 billion users\nText, voice, video calls\nStatus updates",
"instagram": "INSTAGRAM\n\nPhoto sharing app\n1 billion users\nReels, Stories\nSocial media platform",
"islam": "ISLAM\n\nPillars: Shahada, Salat, Zakat, Sawm, Hajj\nHoly: Quran\nProphet: Muhammad (PBUH)",
"quran": "QURAN\n\nVerses: 6236\nSurahs: 114\nLanguage: Arabic\nHoly book of Islam",
"dua": "DUA / PRAYER\n\nMorning: Subhanallaz\nNight: Astaghfirullah\nGeneral: La ilaha illallah",
"food": "FOOD\n\nNorth: Paneer, Naan\nSouth: Dosa, Idli\nBihar: Litti Chokha",
"health": "HEALTH\n\n1. Water 8 glasses\n2. Sleep 8 hours\n3. Exercise\n4. Veggies\n5. No junk",
"jokes": "JOKES\n\n1. Why chicken? Other side!\n2. 2+2=4!\n3. Ball comes, out!",
"facts": "FACTS\n\nSun 330000x Earth\nWater = H2O\nDiamond hardest\nOctopus 3 hearts"
};

// Get elements
var msgDiv = document.getElementById("msg");
var welDiv = document.getElementById("welcome");
var txtBox = document.getElementById("txt");

// Send message
function send() {
var text = txtBox.value.trim().toLowerCase();
if (!text) return;
welDiv.style.display = "none";
addMessage(text, "user");
txtBox.value = "";
setTimeout(function() { addMessage(getReply(text), "bot"); }, 300);
}

// Get reply
function getReply(input) {
for (var key in db) {
if (input.indexOf(key) !== -1) return db[key];
}
return "Ask about Faizul, India, Bihar, countries, cricket, food!";
}

// Add message
function addMessage(text, sender) {
var div = document.createElement("div");
div.className = "m " + sender;
div.innerHTML = "<div class='av'>" + (sender === "user" ? "You" : "AI") + "</div><div class='ct'>" + text + "</div>";
msgDiv.appendChild(div);
document.getElementById("chatArea").scrollTop = 100000;
}

// Clear chat
function clearChat() {
msgDiv.innerHTML = "";
welDiv.style.display = "flex";
}

// Event listeners
document.getElementById("sendBtn").addEventListener("click", send);
document.getElementById("clearBtn").addEventListener("click", clearChat);

txtBox.addEventListener("keypress", function(e) {
if (e.key === "Enter") send();
});

// Button clicks using data-ask attribute
document.querySelectorAll("[data-ask]").forEach(function(btn) {
btn.addEventListener("click", function() {
txtBox.value = this.getAttribute("data-ask");
send();
});
});

console.log("Faizul AI Ready!");
</script>
</body>
</html>
