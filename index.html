<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🤖 Faizul AI</h2>

<button onclick="clearChat()">🧹 New Chat</button>
<button>💡 Ideas</button>
<button>📜 History</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
Faizul AI Pro (Powered by OpenAI)
</div>

<!-- CHAT -->
<div id="chatMessages" class="chat-messages">

<div class="bot-message">
👋 Hello! I am Faizul AI Pro. Ask me anything.
</div>

</div>

<!-- INPUT -->
<div class="input-area">

<input type="text" id="userInput" placeholder="Message Faizul AI...">

<button onclick="chatAI()">Send</button>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
