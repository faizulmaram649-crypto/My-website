<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizul AI - Free Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <button class="new-chat-btn" onclick="newChat()">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
            <div class="sidebar-menu">
                <h3>Features</h3>
                <button class="menu-btn" onclick="quickAsk('cricket')">
                    <i class="fa-solid fa-cricket"></i> Cricket
                </button>
                <button class="menu-btn" onclick="quickAsk('education')">
                    <i class="fa-solid fa-book"></i> Education
                </button>
                <button class="menu-btn" onclick="quickAsk('jokes')">
                    <i class="fa-solid fa-face-laugh"></i> Fun
                </button>
            </div>
            <div class="sidebar-bottom">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <span>Faizul AI</span>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="main-header">
                <h1>Faizul AI</h1>
                <button class="icon-btn" onclick="clearChat()">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </header>
            
            <div class="chat-area" id="chatArea">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h2>Namaste! Main Faizul AI hu</h2>
                    <p>Muqadha se baat karo!</p>
                    <div class="quick-links">
                        <button onclick="quickAsk('hello')">👋 Hello</button>
                        <button onclick="quickAsk('cricket')">🏏 Cricket</button>
                        <button onclick="quickAsk('education')">📚 Education</button>
                        <button onclick="quickAsk('jokes')">😄 Jokes</button>
                    </div>
                </div>
                <div id="messages"></div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="userInput" placeholder="Type message..." onkeydown="if(event.key==='Enter')sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="disclaimer">Free AI - No API Required! 🎉</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
