* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #f4f4f5; height: 100vh; }

.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.welcome h2 { font-size: 30px; margin-bottom: 8px; }
.welcome h3 { color: #00d48a; margin-bottom: 12px; }
.welcome p { color: #9ca3af; margin-bottom: 20px; }
.ql { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 400px; }
.ql button { padding: 10px 14px; background: #1a1a22; border: 1px solid #28282f; border-radius: 8px; color: #f4f4f5; cursor: pointer; font-size: 13px; }
.ql button:hover { background: #00d48a; color: #0a0a0f; }
#msg { display: flex; flex-direction: column; gap: 15px; max-width: 700px; margin: 0 auto; }
.m { display: flex; gap: 12px; }
.m.user { flex-direction: row-reverse; }
.av { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.m.user .av { background: #00d48a; }
.m.bot .av { background: linear-gradient(135deg, #8b5cf6, #00d48a); }

.m.user .ct { background: #00d48a; color: #0a0a0f; }
.m.bot .ct { background: #1a1a22; border: 1px solid #28282f; white-space: pre-line; }
.input-area { padding: 15px 20px; background: #0a0a0f; }
.input-box { max-width: 700px; margin: 0 auto; background: #1e1e28; border: 1px solid #28282f; border-radius: 14px; display: flex; padding: 8px 12px; }
.input-box input { flex: 1; background: transparent; border: none; color: #f4f4f5; font-size: 14px; padding: 10px; outline: none; }
.input-box button { width: 44px; height: 44px; background: #00d48a; border: none; border-radius: 10px; color: #0a0a0f; cursor: pointer; }
.info { max-width: 700px; margin: 8px auto 0; font-size: 11px; color: #6b7280; display: flex; justify-content: space-between; }
@media (max-width: 768px) { .sidebar { display: none; } }
