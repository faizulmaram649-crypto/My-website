<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI - Smart Chatbot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #f4f4f5; height: 100vh; display: flex; }
.app { display: flex; height: 100vh; }
.sidebar { width: 260px; background: #121218; border-right: 1px solid #28282f; padding: 16px; display: flex; flex-direction: column; }
.logo { display: flex; align-items: center; gap: 10px; padding: 12px; font-size: 20px; font-weight: 700; color: #00d48a; margin-bottom: 20px; }
.logo i { font-size: 24px; }
.new-chat-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid #28282f; border-radius: 12px; color: #f4f4f5; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
.new-chat-btn:hover { background: #252530; border-color: #00d48a; }
.sidebar-menu { margin-top: 10px; }
.sidebar-menu h3 { font-size: 11px; text-transform: uppercase; color: #6b7280; letter-spacing: 1px; margin-bottom: 10px; }
.menu-btn { width: 100%; padding: 12px; background: transparent; border: none; border-radius: 10px; color: #9ca3af; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.menu-btn:hover { background: #252530; color: #f4f4f5; }
.sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid #28282f; }
.user-profile { display: flex; align-items: center; gap: 10px; }
.avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.user-info span { font-size: 14px; font-weight: 600; display: block; }
.user-info small { font-size: 12px; color: #00d48a; }
.main-content { flex: 1; display: flex; flex-direction: column; }
.main-header { padding: 16px 24px; border-bottom: 1px solid #28282f; display: flex; justify-content: space-between; align-items: center; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-left h1 { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #00d48a, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.status { font-size: 12px; color: #00d48a; }
.icon-btn { width: 40px; height: 40px; background: transparent; border: 1px solid #28282f; border-radius: 10px; color: #9ca3af; cursor: pointer; }
.icon-btn:hover { background: #252530; }
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85%; text-align: center; padding: 20px; }
.welcome-icon { width: 90px; height: 90px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.welcome h2 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
.welcome h3 { font-size: 24px; color: #00d48a; margin-bottom: 8px; }
.welcome p { color: #9ca3af; margin-bottom: 24px; }
.quick-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
.quick-links button { padding: 12px 20px; background: #1a1a22; border: 1px solid #28282f; border-radius: 10px; color: #f4f4f5; font-size: 14px; cursor: pointer; }
.quick-links button:hover { background: #252530; border-color: #00d48a; }
#messages { display: flex; flex-direction: column; gap: 16px; max-width: 800px; margin: 0 auto; width: 100%; }
.message { display: flex; gap: 12px; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }
.msg-avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.message.user .msg-avatar { background: #00d48a; color: #0a0a0f; }
.message.bot .msg-avatar { background: linear-gradient(135deg, #8b5cf6, #00d48a); }
.msg-content { max-width: 70%; padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6; }
.message.user .msg-content { background: #00d48a; color: #0a0a0f; border-bottom-right-radius: 4px; }
.message.bot .msg-content { background: #1a1a22; border: 1px solid #28282f; }
.input-area { padding: 16px 24px 24px; background: linear-gradient(transparent, #0a0a0f 30%); }
.input-container { max-width: 800px; margin: 0 auto; background: #1e1e28; border: 1px solid #28282f; border-radius: 16px; display: flex; padding: 8px 12px; align-items: center; }
.input-container input { flex: 1; background: transparent; border: none; color: #f4f4f5; font-size: 15px; padding: 10px; outline: none; }
.send-btn { min-width: 46px; height: 46px; background: #00d48a; border: none; border-radius: 12px; color: #0a0a0f; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; padding: 0 12px; }
.send-btn:hover { background: #00b878; }
.input-info { display: flex; justify-content: space-between; max-width: 800px; margin: 10px auto 0; }
.input-info span { font-size: 12px; color: #6b7280; }
@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo"><i class="fa-solid fa-robot"></i><span>Faizul AI</span></div>
<button class="new-chat-btn" onclick="newChat()"><i class="fa-solid fa-plus"></i> New Chat</button>
<div class="sidebar-menu">
<h3>Quick Actions</h3>
<button class="menu-btn" onclick="quickAsk('jokes')">😄 Jokes</button>

</div>
<div class="sidebar-bottom">
<div class="user-profile">
<div class="avatar"><i class="fa-solid fa-robot"></i></div>
<div class="user-info"><span>Faizul AI</span><small>Always Active</small></div>
</div>
</div>
</aside>
<main class="main-content">
<header class="main-header">
<div class="header-left"><h1>Faizul AI</h1><span class="status">● Online</span></div>
<div class="header-right"><button class="icon-btn" onclick="clearChat()"><i class="fa-solid fa-trash"></i></button></div>
</header>
<div class="chat-area" id="chatArea">
<div class="welcome" id="welcome">
<div class="welcome-icon"><i class="fa-solid fa-robot"></i></div>
<h2>Hello!</h2>
<h3>Welcome to Faizul AI</h3>
<p>Your Smart AI Companion!</p>
<div class="quick-links">
<button onclick="quickAsk('hello')">👋 Hello</button>
<button onclick="quickAsk('virat')">🦁 Virat Kohli</button>
<button onclick="quickAsk('dhoni')">🦉 MS Dhoni</button>
<button onclick="quickAsk('jokes')">😄 Jokes</button>
</div>
</div>
<div id="messages"></div>
</div>
<div class="input-area">
<div class="input-container">
<input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
<button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
</div>
<p class="input-info"><span><i class="fa-solid fa-robot"></i> Free AI - No API Required!</span></p>
</div>
</main>
</div>
