<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #f4f4f5; height: 100vh; }
.app { display: flex; height: 100vh; }
.sidebar { width: 260px; background: #121218; border-right: 1px solid #28282f; padding: 16px; display: flex; flex-direction: column; }
.logo { font-size: 20px; font-weight: 700; color: #00d48a; margin-bottom: 20px; }
.logo i { margin-right: 10px; }
.new-chat-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid #28282f; border-radius: 12px; color: #f4f4f5; cursor: pointer; margin-bottom: 20px; }
.sidebar-menu h3 { font-size: 11px; text-transform: uppercase; color: #6b7280; margin-bottom: 10px; }
.menu-btn { width: 100%; padding: 12px; background: transparent; border: none; border-radius: 10px; color: #9ca3af; cursor: pointer; text-align: left; margin-bottom: 4px; font-size: 14px; }
.menu-btn:hover { background: #252530; }
.sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid #28282f; }
.avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.main-content { flex: 1; display: flex; flex-direction: column; }
.main-header { padding: 16px 24px; border-bottom: 1px solid #28282f; display: flex; justify-content: space-between; }
.main-header h1 { font-size: 22px; background: linear-gradient(90deg, #00d48a, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.icon-btn { width: 40px; height: 40px; background: transparent; border: 1px solid #28282f; border-radius: 10px; color: #9ca3af; cursor: pointer; }
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
.welcome-icon { width: 90px; height: 90px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; }
.welcome h2 { font-size: 32px; margin-bottom: 8px; }
.welcome h3 { color: #00d48a; margin-bottom: 16px; }
.quick-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.quick-links button { padding: 12px 18px; background: #1a1a22; border: 1px solid #28282f; border-radius: 10px; color: #f4f4f5; cursor: pointer; }
#messages { display: flex; flex-direction: column; gap: 16px; max-width: 800px; margin: 0 auto; width: 100%; }
.message { display: flex; gap: 12px; }
.message.user { flex-direction: row-reverse; }
.msg-avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.message.user .msg-avatar { background: #00d48a; }
.message.bot .msg-avatar { background: linear-gradient(135deg, #8b5cf6, #00d48a); }
.msg-content { max-width: 70%; padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.5; }
.message.user .msg-content { background: #00d48a; color: #0a0a0f; }
.message.bot .msg-content { background: #1a1a22; border: 1px solid #28282f; }
.input-area { padding: 16px 24px; background: linear-gradient(transparent, #0a0a0f); }
.input-container { max-width: 800px; margin: 0 auto; background: #1e1e28; border: 1px solid #28282f; border-radius: 16px; display: flex; padding: 8px 12px; align-items: center; }
.input-text { flex: 1; background: transparent; border: none; color: #f4f4f5; font-size: 15px; padding: 10px; outline: none; }
.send-btn { width: 46px; height: 46px; background: #00d48a; border: none; border-radius: 12px; color: #0a0a0f; cursor: pointer; font-size: 18px; }
.send-btn:hover { background: #00b878; }
.input-info { max-width: 800px; margin: 10px auto 0; font-size: 12px; color: #6b7280; }
@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo"><i class="fa-solid fa-robot"></i>Faizul AI</div>
<button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
<div class="sidebar-menu">
<h3>Quick</h3>
<button class="menu-btn" onclick="quickAsk('jokes')">😄 Jokes</button>
<button class="menu-btn" onclick="quickAsk('facts')">💡 Facts</button>
<button class="menu-btn" onclick="quickAsk('virat')">🦁 Virat</button>
<button class="menu-btn" onclick="quickAsk('dhoni')">🦉 Dhoni</button>
</div>
</aside>
<main class="main-content">
<header class="main-header">
<h1>Faizul AI</h1>
<button class="icon-btn" onclick="clearChat()">🗑️</button>
</header>
<div class="chat-area" id="chatArea">
<div class="welcome" id="welcome">
<div class="welcome-icon">🤖</div>
<h2>Hello!</h2>
<h3>Welcome to Faizul AI</h3>
<div class="quick-links">
<button onclick="quickAsk('hello')">👋 Hello</button>
<button onclick="quickAsk('virat')">🦁 Virat</button>
<button onclick="quickAsk('dhoni')">🦉 Dhoni</button>
<button onclick="quickAsk('jokes')">😄 Jokes</button>
</div>
</div>
<div id="messages"></div>
</div>
<div class="input-area">
<div class="input-container">
<input type="text" id="inputText" class="input-text" placeholder="Type message...">
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>
<div class="input-info">Free AI - No API Required!</div>
</div>
</main>
</div>

<script>
// ===== RESPONSES =====
var responses = {
"hello": "Hello! 👋 Welcome to Faizul AI! Ask me about cricket, education, jokes or anything!",
"hi": "Hi! 👋 Welcome! How can I help you?",
"virat": "🦁 VIRAT KOHLI:\n• Jersey: 18\n• Born: 5 Nov 1988\n• Runs: 25000+\n• King Kohli 👑",
"kohli": "🦁 VIRAT KOHLI:\n• Jersey: 18\n• Born: 5 Nov 1988\n• King of Cricket!",
"dhoni": "🦉 MS DHONI:\n• Jersey: 7\n• Born: 7 July 1981\n• Captain Cool 🧊",
"ms dhoni": "🦉 MS DHONI:\n• Jersey: 7\n• World Cup 2011 🏆",
"rohit": "🐢 ROHIT SHARMA:\n• Jersey: 45\n• Highest: 264\n• The Hitman!",
"hardik": "🔥 HARDIK PANDYA:\n• Jersey: 11\n• All-rounder",
"bumrah": "🎯 JASPRIT BUMRAH:\n• Jersey: 93\n• Yorker King!",
"cricket": "🏏 CRICKET:\n• Virat: 18\n• Rohit: 45\n• Dhoni: 7\n• Hardik: 11\n• Bumrah: 93",
"jokes": "😄 JOKES:\n1. Why chicken cross road?\n→ Other side! 🐔\n\n2. 2+2 = 4! 😂\n\n3. Ball aata hai, out nahi! 🏏",
"facts": "💡 FACTS:\n• Sun = 330000× Earth\n• Water = H2O\n• Human = 60% water",
"math": "📐 MATH:\n• a² + b² = c²\n• (a+b)² = a²+2ab+b²",
"science": "🔬 SCIENCE:\n• Water = H2O\n• Light = 3×10⁸ m/s",
"who": "I'm Faizul AI! 🤖 Your smart AI companion!",
"help": "Type message and click send! Or press Enter!",
"thanks": "Welcome! 😊",
"bye": "Bye! 👋 Take care!"
};

// ===== FUNCTIONS =====
var messagesDiv = document.getElementById('messages');
var welcomeDiv = document.getElementById('welcome');
var inputText = document.getElementById('inputText');

function sendMessage() {
var text = inputText.value.trim().toLowerCase();
if (text === "") return;
welcomeDiv.style.display = 'none';
addMessage(text, 'user');
inputText.value = '';
setTimeout(function() { addMessage(findResponse(text), 'bot'); }, 500);
}

function findResponse(input) {
for (var key in responses) {
if (input.includes(key)) return responses[key];
}
var defaults = ["Interesting! Tell me more!", "Ask about cricket or facts!", "I didn't get that! Try something else!"];
return defaults[Math.floor(Math.random() * defaults.length)];
}

function addMessage(text, sender) {
var div = document.createElement('div');
div.className = 'message ' + sender;
div.innerHTML = '<div class="msg-avatar">' + (sender === 'user' ? '👤' : '🤖') + '</div><div class="msg-content">' + text.replace(/\n/g, '<br>') + '</div>';
messagesDiv.appendChild(div);
document.getElementById('chatArea').scrollTop = 100000;
}

function quickAsk(text) {
inputText.value = text;
sendMessage();
}

function newChat() {
messagesDiv.innerHTML = '';
welcomeDiv.style.display = 'flex';
}

function clearChat() {
if (confirm('Clear chat?')) newChat();
}

// ===== EVENT LISTENERS =====
inputText.addEventListener('keydown', function(event) {
if (event.key === 'Enter') {
sendMessage();
}
});

var sendBtn = document.querySelector('.send-btn');
sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
