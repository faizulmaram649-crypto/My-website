<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizul AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968267.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" onclick="newChat()">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="sidebar-menu">
                <h3>Mode</h3>
                <button class="menu-btn active" id="chatModeBtn" onclick="setMode('chat')">
                    <i class="fa-solid fa-comments"></i>
                    <span>Chat Mode</span>
                </button>
                <button class="menu-btn" id="imageModeBtn" onclick="setMode('image')">
                    <i class="fa-solid fa-image"></i>
                    <span>Image Gen</span>
                </button>
            </div>
            
            <div class="sidebar-bottom">
                <div class="user-profile">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <span>Faizul AI</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <h1>Faizul AI</h1>
                </div>
                <div class="header-right">
                    <button class="icon-btn" onclick="clearChat()" title="Clear">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Welcome -->
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h2>How can I help you today?</h2>
                    <p>Ask me anything or generate images</p>
                    
                    <div class="quick-links">
                        <button onclick="quickSend('Write a python calculator')">Calculator Code</button>
                        <button onclick="quickSend('What is AI?')">What is AI?</button>
                        <button onclick="quickImage('A beautiful sunset over mountains')">Generate Image</button>
                        <button onclick="quickSend('Write a poem')">Write a Poem</button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages" id="messages"></div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <div class="input-container">
                    <!-- Chat Input -->
                    <div class="input-group active" id="chatInputGroup">
                        <textarea id="chatInput" placeholder="Type your message..." rows="1"></textarea>
                    </div>
                    
                    <!-- Image Input -->
                    <div class="input-group" id="imageInputGroup">
                        <input type="text" id="imageInput" placeholder="Describe the image you want...">
                        <select id="imageSize">
                            <option value="1024x1024">1024×1024</option>
                            <option value="1024x1792">1024×1792</option>
                            <option value="1792x1024">1792×1024</option>
                        </select>
                    </div>
                    
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="disclaimer">AI can make mistakes</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
