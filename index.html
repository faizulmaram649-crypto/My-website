<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo"><i class="fa-solid fa-robot"></i> Faizul AI</div>
<button class="btn" onclick="doClick('who is faizul')"><i class="fa-solid fa-user"></i> Creator</button>
<button class="btn" onclick="doClick('hello')"><i class="fa-solid fa-hand-wave"></i> Hello</button>
<div class="head">India</div>
<button class="btn" onclick="doClick('india')">India</button>
<button class="btn" onclick="doClick('bihar')">Bihar</button>
<button class="btn" onclick="doClick('countries')">Countries</button>
<div class="head">Language</div>
<button class="btn" onclick="doClick('urdu')">Urdu</button>
<button class="btn" onclick="doClick('hindi')">Hindi</button>
<button class="btn" onclick="doClick('english')">English</button>
<div class="head">Cricket</div>
<button class="btn" onclick="doClick('virat')">Virat</button>
<button class="btn" onclick="doClick('dhoni')">Dhoni</button>
<button class="btn" onclick="doClick('rohit')">Rohit</button>
<div class="head">Study</div>
<button class="btn" onclick="doClick('math')">Math</button>
<button class="btn" onclick="doClick('science')">Science</button>
<button class="btn" onclick="doClick('history')">History</button>
<div class="head">Islamic</div>
<button class="btn" onclick="doClick('islam')">Islam</button>
<button class="btn" onclick="doClick('quran')">Quran</button>
<button class="btn" onclick="doClick('dua')">Dua</button>
<div class="head">Food</div>
<button class="btn" onclick="doClick('food')">Food</button>
<button class="btn" onclick="doClick('health')">Health</button>
<div class="head">Fun</div>
<button class="btn" onclick="doClick('jokes')">Jokes</button>
<button class="btn" onclick="doClick('facts')">Facts</button>
</aside>
<main class="main">
<header class="header">
<h1>Faizul AI</h1>
<button class="clear-btn" onclick="clearChat()">Clear</button>
</header>
<div class="chat" id="chatArea">
<div class="welcome" id="welcome">
<div class="icon"><i class="fa-solid fa-robot"></i></div>
<h2>Hello!</h2>
<h3>Welcome to Faizul AI</h3>
<p>Your Knowledge Assistant</p>
<div class="quick">
<button onclick="doClick('hello')">Hello</button>
<button onclick="doClick('who is faizul')">Creator</button>
<button onclick="doClick('bihar')">Bihar</button>
<button onclick="doClick('urdu')">Urdu</button>
<button onclick="doClick('virat')">Virat</button>
<button onclick="doClick('jokes')">Jokes</button>
</div>
</div>
<div id="msg"></div>
</div>
<div class="input-area">
<div class="input-box">
<input type="text" id="txt" placeholder="Ask anything...">
<button onclick="sendMsg()">Send</button>
</div>
<div class="info">Press Enter to send</div>
</div>
</main>
</div>
<script src="script.js"></script>
</body>
</html>
