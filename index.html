<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizul AI - Smart Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-robot"></i>
                <span>Faizul AI</span>
            </div>
            
            <button class="new-chat-btn" onclick="newChat()">
                <i class="fa-solid fa-plus"></i>
                New Chat
            </button>
            
            <div class="sidebar-menu">
                <h3>Quick Actions</h3>
                <button class="menu-btn" onclick="quickAsk('jokes')">
                    <i class="fa-solid fa-face-laugh"></i> Jokes
                </button>
                <button class="menu-btn" onclick="quickAsk('facts')">
                    <i class="fa-solid fa-lightbulb"></i> Facts
                </button>
                <button class="menu-btn" onclick="quickAsk('virat')">
                    <i class="fa-solid fa-cricket-ball"></i> Virat Kohli
                </button>
                <button class="menu-btn" onclick="quickAsk('dhoni')">
                    <i class="fa-solid fa-cricket-ball"></i> MS Dhoni
                </button>
            </div>
            
            <div class="sidebar-menu">
                <h3>Education</h3>
                <button class="menu-btn" onclick="quickAsk('math')">
                    <i class="fa-solid fa-calculator"></i> Math
                </button>
                <button class="menu-btn" onclick="quickAsk('science')">
                    <i class="fa-solid fa-flask"></i> Science
                </button>
            </div>
            
            <div class="sidebar-bottom">
                <div class="user-profile">
                    <div class="avatar">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="user-info">
                        <span>Faizul AI</span>
                        <small>Always Active</small>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Faizul AI</h1>
                    <span class="status">● Online</span>
                </div>
                <div class="header-right">
                    <button class="icon-btn" onclick="clearChat()" title="Clear Chat">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </header>
            
            <div class="chat-area" id="chatArea">
                <!-- Welcome Screen -->
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h2>Hello!</h2>
                    <h3>Welcome to Faizul AI</h3>
                    <p>Your Smart AI Companion</p>
                    <div class="quick-links">
                        <button onclick="quickAsk('hello')">👋 Hello</button>
                        <button onclick="quickAsk('virat')">🦁 Virat</button>
                        <button onclick="quickAsk('dhoni')">🦉 Dhoni</button>
                        <button onclick="quickAsk('jokes')">😄 Jokes</button>
                    </div>
                </div>
                
                <!-- Messages -->
                <div id="messages"></div>
            </div>
            
            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
                    <button class="send-btn" id="sendBtn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="input-info">
                    <span><i class="fa-solid fa-robot"></i> Free AI - No API Required!</span>
                </p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
