<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo"><i class="fa-solid fa-robot"></i> Faizul AI</div>
<button class="btn" data="who is faizul"><i class="fa-solid fa-user"></i> Creator</button>
<button class="btn" data="hello"><i class="fa-solid fa-hand-wave"></i> Hello</button>
<div class="head">India</div>
<button class="btn" data="india">India</button>
<button class="btn" data="bihar">Bihar</button>
<button class="btn" data="countries">Countries</button>
<div class="head">Language</div>
<button class="btn" data="urdu">Urdu</button>
<button class="btn" data="hindi">Hindi</button>
<button class="btn" data="english">English</button>
<div class="head">Cricket</div>
<button class="btn" data="virat">Virat</button>
<button class="btn" data="dhoni">Dhoni</button>
<button class="btn" data="rohit">Rohit</button>
<div class="head">Study</div>
<button class="btn" data="math">Math</button>
<button class="btn" data="science">Science</button>
<button class="btn" data="history">History</button>
<div class="head">Islamic</div>
<button class="btn" data="islam">Islam</button>
<button class="btn" data="quran">Quran</button>
<button class="btn" data="hadith">Hadith</button>
<button class="btn" data="dua">Dua</button>
<div class="head">Lifestyle</div>
<button class="btn" data="food">Food</button>
<button class="btn" data="health">Health</button>
<button class="btn" data="fitness">Fitness</button>
<div class="head">Tech</div>
<button class="btn" data="technology">Technology</button>
<button class="btn" data="coding">Coding</button>
<button class="btn" data="mobile">Mobile</button>
<div class="head">Fun</div>
<button class="btn" data="jokes">Jokes</button>
<button class="btn" data="facts">Facts</button>
<button class="btn" data="movies">Movies</button>
<button class="btn" data="books">Books</button>
</aside>
<main class="main">
<header class="header">
<h1>Faizul AI</h1>
<button class="clear-btn" id="clearChat"><i class="fa-solid fa-trash"></i> Clear</button>
</header>
<div class="chat" id="chatArea">
<div class="welcome" id="welcome">
<div class="icon"><i class="fa-solid fa-robot"></i></div>
<h2>Hello!</h2>
<h3>Welcome to Faizul AI</h3>
<p>Your Knowledge Assistant</p>
<div class="quick">
<button data="hello">Hello</button>
<button data="who is faizul">Creator</button>
<button data="bihar">Bihar</button>
<button data="urdu">Urdu</button>
<button data="virat">Virat</button>
<button data="jokes">Jokes</button>
</div>
</div>
<div id="msg"></div>
</div>
<div class="input-area">
<div class="input-box">
<input type="text" id="txt" placeholder="Ask anything...">
<button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
</div>
<div class="info">Press Enter to send</div>
</div>
</main>
</div>
<script src="script.js"></script>
</body>
</html>
