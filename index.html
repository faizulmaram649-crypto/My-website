.m.user { flex-direction: row-reverse; }

.m.bot .av { background: linear-gradient(135deg, #8b5cf6, #00d48a); }

.m.bot .ct { background: #1a1a22; border: 1px solid #333; white-space: pre-line; }

.input-box { max-width: 600px; margin: 0 auto; background: #1e1e28; border: 1px solid #333; border-radius: 12px; display: flex; padding: 8px; }
.input-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; padding: 8px; outline: none; }
