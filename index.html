<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Faizul AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
font-family: 'Poppins', sans-serif;
background: #0a0a0f;
color: #fff;
overflow: hidden;
touch-action: manipulation;
}

.app {
display: flex;
height: 100vh;
width: 100%;
}

/* Sidebar - Desktop only */
.sidebar {
width: 220px;
background: #121218;
padding: 15px;
border-right: 1px solid #28282f;
overflow-y: auto;
flex-shrink: 0;
}

.logo {
font-size: 22px;
font-weight: 700;
color: #00d48a;
margin-bottom: 15px;
}

.btn {
width: 100%;
padding: 10px;
background: transparent;
border: 1px solid #28282f;
border-radius: 8px;
color: #9ca3af;
margin-bottom: 5px;
cursor: pointer;
font-size: 13px;
text-align: left;
transition: all 0.2s;
}

.btn:hover {
background: #252530;
color: #00d48a;
border-color: #00d48a;
}

.btn:active {
transform: scale(0.98);
}

.head {
font-size: 10px;
text-transform: uppercase;
color: #6b7280;
margin: 12px 0 8px;
letter-spacing: 1px;
}

/* Main Content */
.main {
flex: 1;
display: flex;
flex-direction: column;
min-width: 0;
}

.header {
padding: 15px 20px;
border-bottom: 1px solid #28282f;
display: flex;
justify-content: space-between;
align-items: center;
}

.header h1 {
font-size: 22px;
background: linear-gradient(90deg, #00d48a, #8b5cf6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.clear-btn {
padding: 8px 14px;
background: transparent;
border: 1px solid #28282f;
border-radius: 6px;
color: #9ca3af;
cursor: pointer;
font-size: 12px;
}

/* Chat Area */
.chat-area {
flex: 1;
overflow-y: auto;
padding: 15px;
-webkit-overflow-scrolling: touch;
}

.welcome {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100%;
text-align: center;
padding: 20px;
}

.icon {
width: 80px;
height: 80px;
background: linear-gradient(135deg, #00d48a, #8b5cf6);
border-radius: 22px;
display: flex;
align-items: center;
justify-content: center;
font-size: 36px;
margin-bottom: 18px;
}

.welcome h2 {
font-size: 28px;
margin-bottom: 6px;
}

.welcome h3 {
color: #00d48a;
margin-bottom: 10px;
}

.welcome p {
color: #9ca3af;
margin-bottom: 20px;
font-size: 14px;
}

.quick {
display: flex;
flex-wrap: wrap;
gap: 8px;
justify-content: center;
max-width: 320px;
}

.quick button {
padding: 8px 12px;
background: #1a1a22;
border: 1px solid #28282f;
border-radius: 8px;
color: #f4f4f5;
cursor: pointer;
font-size: 12px;
transition: all 0.2s;
}

.quick button:hover {
background: #00d48a;
color: #0a0a0f;
}

/* Messages */
#msg {
display: flex;
flex-direction: column;
gap: 12px;
max-width: 100%;
}

.m {
display: flex;
gap: 10px;
align-items: flex-end;
}

.m.user {
flex-direction: row-reverse;
}

.av {
width: 32px;
height: 32px;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: 600;
flex-shrink: 0;
}

.m.user .av {
background: #00d48a;
color: #0a0a0f;
}

.m.bot .av {
background: linear-gradient(135deg, #8b5cf6, #00d48a);
color: #fff;
}

.ct {
max-width: 75%;
padding: 12px 14px;
border-radius: 14px;
font-size: 13px;
line-height: 1.5;
word-wrap: break-word;
}

.m.user .ct {
background: #00d48a;
color: #0a0a0f;
border-bottom-right-radius: 3px;
}

.m.bot .ct {
background: #1a1a22;
border: 1px solid #28282f;
white-space: pre-line;
}

/* Input Area */
.input-area {
padding: 14px 18px;
background: linear-gradient(to top, #0a0a0f 30%, transparent);
position: relative;
}

.input-box {
max-width: 700px;
margin: 0 auto;
background: #1e1e28;
border: 1px solid #28282f;
border-radius: 14px;
display: flex;
padding: 6px;
align-items: center;
}

.input-box input {
flex: 1;
background: transparent;
border: none;
color: #f4f4f5;
font-size: 14px;
padding: 10px;
outline: none;
font-family: 'Poppins', sans-serif;
}

.input-box input::placeholder {
color: #6b7280;
}

.input-box button {
width: 42px;
height: 42px;
background: #00d48a;
border: none;
border-radius: 10px;
color: #0a0a0f;
cursor: pointer;
font-size: 16px;
font-weight: 600;
transition: all 0.2s;
}

.input-box button:active {
transform: scale(0.95);
}

.info {
max-width: 700px;
margin: 8px auto 0;
font-size: 11px;
color: #6b7280;
display: flex;
justify-content: space-between;
}

/* Mobile Responsive */
@media (max-width: 768px) {
.sidebar {
display: none;
}

.welcome {
display: flex;
}

.header {
padding: 12px 15px;
}

.header h1 {
font-size: 18px;
}

.chat-area {
padding: 12px;
}

.icon {
width: 65px;
height: 65px;
font-size: 28px;
border-radius: 18px;
}

.welcome h2 {
font-size: 22px;
}

.welcome h3 {
font-size: 16px;
}

.quick {
max-width: 280px;
gap: 6px;
}

.quick button {
padding: 7px 10px;
font-size: 11px;
}

.ct {
max-width: 80%;
font-size: 12px;
padding: 10px 12px;
}

.input-area {
padding: 10px 14px;
}

.input-box {
border-radius: 12px;
}

.input-box input {
font-size: 13px;
padding: 8px;
}

.input-box button {
width: 38px;
height: 38px;
font-size: 14px;
}

.info {
font-size: 10px;
}
}

/* Desktop - hide welcome on mobile */
@media (min-width: 769px) {
.welcome {
display: flex;
}
}
</style>
</head>

</div>

<!-- Messages -->
<div id="msg"></div>

<!-- Input -->
<div class="input-area">

</main>
</div>
