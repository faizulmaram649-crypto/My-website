<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizul AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #f4f4f5; height: 100vh; }
.app { display: flex; height: 100vh; }
.sidebar { width: 250px; background: #121218; border-right: 1px solid #28282f; padding: 12px; overflow-y: auto; }
.logo { font-size: 20px; font-weight: 700; color: #00d48a; margin-bottom: 12px; }
.btn { width: 100%; padding: 9px; background: transparent; border: 1px solid #28282f; border-radius: 7px; color: #9ca3af; cursor: pointer; text-align: left; margin-bottom: 4px; font-size: 12px; }
.btn:hover { background: #252530; color: #00d48a; }
.h3 { font-size: 10px; text-transform: uppercase; color: #6b7280; margin: 12px 0 8px; }
.main { flex: 1; display: flex; flex-direction: column; }
.header { padding: 12px 18px; border-bottom: 1px solid #28282f; display: flex; justify-content: space-between; }
.header h1 { font-size: 20px; background: linear-gradient(90deg, #00d48a, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-area { flex: 1; overflow-y: auto; padding: 18px; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
.icon { width: 80px; height: 80px; background: linear-gradient(135deg, #00d48a, #8b5cf6); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 18px; }
.welcome h2 { font-size: 26px; margin-bottom: 6px; }
.welcome h3 { color: #00d48a; margin-bottom: 10px; }
.welcome p { color: #9ca3af; margin-bottom: 18px; }
.ql { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 380px; }
.ql button { padding: 9px 12px; background: #1a1a22; border: 1px solid #28282f; border-radius: 7px; color: #f4f4f5; cursor: pointer; font-size: 12px; }
#msg { display: flex; flex-direction: column; gap: 14px; max-width: 650px; margin: 0 auto; }
.m { display: flex; gap: 10px; }
.m.user { flex-direction: row-reverse; }
.av { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
.m.user .av { background: #00d48a; color: #0a0a0f; }
.m.bot .av { background: linear-gradient(135deg, #8b5cf6, #00d48a); color: #fff; }
.ct { max-width: 68%; padding: 12px 15px; border-radius: 15px; font-size: 13px; line-height: 1.5; }
.m.user .ct { background: #00d48a; color: #0a0a0f; }
.m.bot .ct { background: #1a1a22; border: 1px solid #28282f; white-space: pre-line; }
.input-area { padding: 12px 18px; background: #0a0a0f; }
.input-box { max-width: 650px; margin: 0 auto; background: #1e1e28; border: 1px solid #28282f; border-radius: 12px; display: flex; padding: 6px 10px; }
.input-box input { flex: 1; background: transparent; border: none; color: #f4f4f5; font-size: 13px; padding: 8px; outline: none; }
.input-box button { width: 38px; height: 38px; background: #00d48a; border: none; border-radius: 8px; color: #0a0a0f; cursor: pointer; font-size: 15px; font-weight: bold; }
.info { max-width: 650px; margin: 6px auto 0; font-size: 10px; color: #6b7280; display: flex; justify-content: space-between; }
@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo">Faizul AI</div>
<button class="btn" onclick="ask('virat')">Virat Kohli</button>
<button class="btn" onclick="ask('dhoni')">MS Dhoni</button>
<button class="btn" onclick="ask('rohit')">Rohit Sharma</button>
<button class="btn" onclick="ask('math')">Math</button>
<button class="btn" onclick="ask('science')">Science</button>
<button class="btn" onclick="ask('food')">Food</button>
<button class="btn" onclick="ask('health')">Health</button>
<button class="btn" onclick="ask('jokes')">Jokes</button>
<button class="btn" onclick="ask('facts')">Facts</button>
</aside>
<main class="main">
<header class="header">
<h1>Faizul AI</h1>
<button class="btn" style="width:auto;padding:6px 12px" onclick="clearChat()">Clear</button>
</header>
<div class="chat-area" id="chatArea">
<div class="welcome" id="welcome">
<div class="icon">AI</div>
<h2>Hello!</h2>
<h3>Welcome to Faizul AI</h3>
<p>Your Complete Knowledge Assistant</p>
<div class="ql">
<button onclick="ask('hello')">Hello</button>
<button onclick="ask('virat')">Virat</button>
<button onclick="ask('math')">Math</button>
<button onclick="ask('food')">Food</button>
</div>
</div>
<div id="msg"></div>
</div>
<div class="input-area">
<div class="input-box">
<input type="text" id="txt" placeholder="Ask anything...">
<button onclick="sendMsg()">Send</button>
</div>
<div class="info"><span>Complete Topics!</span></div>
</div>
</main>
</div>

<script>
var responses = {
"hello": "Hello! Welcome to Faizul AI! Ask about cricket, math, food, health, jokes, or Who is Faizul!",
"hi": "Hi! Ask me anything!",
"how": "I'm doing great! How can I help you?",
"who": "I am Faizul AI - your knowledge assistant!",
"who is faizul": "FAIZUL MARAM - Creator\n\nYouTube: faizulmaram17\nContent: Islamic videos, religious quotes, Duas, Motivational clips\nDeveloper: Websites, AI Chatbots\n\nHe creates Islamic content and develops websites!",
"faizul": "FAIZUL MARAM - Creator\n\nYouTube: faizulmaram17\nContent: Islamic videos, religious quotes\nDeveloper: Websites, AI Chatbots",
"virat": "VIRAT KOHLI:\nJersey: 18\nBorn: 5 Nov 1988\nDelhi\nAge: 36\nRole: Batsman\nRuns: 25000+\nKing Kohli!",
"dhoni": "MS DHONI:\nJersey: 7\nBorn: 7 July 1981\nRanchi\nAge: 43\nCaptain Cool\nWorld Cup 2011 winner!",
"rohit": "ROHIT SHARMA:\nJersey: 45\nBorn: 30 April 1987\nHighest: 264\nThe Hitman!",
"math": "MATH:\n(a+b)2 = a2+2ab+b2\na2-b2 = (a+b)(a-b)\nCircle = pi*r2\na2+b2 = c2",
"science": "SCIENCE:\nWater = H2O\nLight = 3x108 m/s\nGravity = 9.8 m/s2\nHuman = 60% water",
"food": "INDIAN FOOD:\nNorth: Paneer, Naan\nSouth: Dosa, Idli\nWest: Dhokla\nBiryani famous!",
"health": "HEALTH:\n1. Water 8 glasses\n2. Sleep 8 hours\n3. Exercise\n4. Veggies\n5. No junk",
"fruit": "FRUITS:\nApple, Mango, Banana, Orange, Papaya, Pomegranate",
"jokes": "JOKES:\n1. Why chicken? Other side! 2. 2+2=4! 3. Ball comes, out doesn't!",
"facts": "FACTS:\nSun 330000x Earth\nWater = H2O\nDiamond hardest",
"thanks": "Welcome!",
"bye": "Goodbye!"
};

var msgDiv = document.getElementById("msg");
var welDiv = document.getElementById("welcome");
var txtBox = document.getElementById("txt");

function sendMsg() {
var text = txtBox.value.trim().toLowerCase();
if (text === "") return;
welDiv.style.display = "none";
addMessage(text, "user");
txtBox.value = "";
setTimeout(function() { addMessage(getResponse(text), "bot"); }, 400);
}

function getResponse(input) {
for (var key in responses) {
if (input.indexOf(key) !== -1) return responses[key];
}
return "Ask about cricket, math, food, health, jokes, facts, or Who is Faizul!";
}

function addMessage(text, sender) {
var div = document.createElement("div");
div.className = "m " + sender;
var avatar = sender === "user" ? "You" : "AI";
div.innerHTML = "<div class='av'>" + avatar + "</div><div class='ct'>" + text + "</div>";
msgDiv.appendChild(div);
document.getElementById("chatArea").scrollTop = 100000;
}

function ask(text) {
txtBox.value = text;
sendMsg();
}

function clearChat() {
msgDiv.innerHTML = "";
welDiv.style.display = "flex";
}

txtBox.addEventListener("keypress", function(e) {
if (e.key === "Enter") sendMsg();
});
</script>
</body>
</html>
